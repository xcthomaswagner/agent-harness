name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  l1-service:
    name: L1 Pre-Processing Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/l1_preprocessing

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/l1_preprocessing/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy main.py models.py config.py analyst.py pipeline.py figma_extractor.py client_profile.py queue_worker.py url_checker.py trace_dashboard.py tracer.py autonomy_ingest.py autonomy_metrics.py autonomy_dashboard.py autonomy_matching.py autonomy_sidecars.py autonomy_artifact_ingest.py learning_api.py learning_dashboard.py operator_api.py operator_api_data.py learning_miner/ adapters/ autonomy_store/

      - name: Run tests
        run: pytest tests/ -v --tb=short

  l3-service:
    name: L3 PR Review Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/l3_pr_review

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/l3_pr_review/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy main.py event_classifier.py spawner.py

      - name: Run tests
        run: pytest tests/ -v --tb=short

  script-tests:
    name: Script Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run inject-runtime tests
        run: python3 tests/test_inject_runtime.py

  operator-ui:
    name: Operator UI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/operator_ui

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/operator_ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build static bundle
        run: npm run build

      - name: Check committed static bundle drift
        working-directory: .
        run: |
          git diff --exit-code -- \
            services/l1_preprocessing/operator_static/index.html \
            services/l1_preprocessing/operator_static/operator.css \
            services/l1_preprocessing/operator_static/operator.js \
            services/l1_preprocessing/operator_static/tokens.css
