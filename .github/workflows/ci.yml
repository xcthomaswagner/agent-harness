name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  l1-service:
    name: L1 Pre-Processing Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/l1_preprocessing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/l1_preprocessing/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy main.py models.py config.py analyst.py pipeline.py figma_extractor.py client_profile.py queue_worker.py cross_ticket_coordinator.py url_checker.py trace_dashboard.py tracer.py autonomy_store.py autonomy_ingest.py autonomy_metrics.py autonomy_dashboard.py autonomy_matching.py autonomy_sidecars.py autonomy_artifact_ingest.py adapters/

      - name: Run tests
        run: pytest tests/ -v --tb=short

  l3-service:
    name: L3 PR Review Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/l3_pr_review

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/l3_pr_review/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy main.py event_classifier.py spawner.py

      - name: Run tests
        run: pytest tests/ -v --tb=short

  script-tests:
    name: Script Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run inject-runtime tests
        run: python3 tests/test_inject_runtime.py
