# Agent Orchestrator config for the Agentic Developer Harness
# This configures Composio to manage Agent Team sessions for client repos.

port: 3002
terminalPort: 3003
directTerminalPort: 3004

defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers:
    - desktop

projects:
  harness-test-client:
    name: Harness Test Client
    path: ../harness-test-client
    repo: xcthomaswagner/harness-test-client
    defaultBranch: main
    sessionPrefix: htc

    agentConfig:
      permissions: permissionless
      model: claude-opus-4-20250514

    # Inject harness runtime files after worktree creation
    postCreate:
      - bash /Users/thomaswagner/Desktop/Projects.nosync/agent-harness/scripts/inject-runtime.sh --target-dir .

    # Agent rules injected into every session
    agentRulesFile: /Users/thomaswagner/Desktop/Projects.nosync/agent-harness/runtime/harness-CLAUDE.md

    symlinks:
      - .env
