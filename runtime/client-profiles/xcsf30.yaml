# Client Profile: XC SF 30in30
# Azure DevOps project connected to the GitHub test client repo.

client: "XC SF 30in30"
platform_profile: "salesforce"  # Salesforce-focused project

ticket_source:
  type: "ado"
  instance: "https://xc-devops.visualstudio.com"
  project_key: "XCSF30"
  ado_project_name: "XC-SF-30in30"  # Actual ADO project name for webhook routing
  ai_label: "ai-implement"
  quick_label: "ai-quick"
  clarification_status: "Needs Info"
  in_progress_status: "Active"       # ADO Agile process uses "Active", not "In Progress"
  done_status: "Done"
  custom_fields: {}

source_control:
  type: "azure-repos"
  org: "https://xc-devops.visualstudio.com"
  repo: "XC-SF-30in30"
  default_branch: "main"
  branch_prefix: "ai/"
  pr_reviewers: []
  ado_project: "XC-SF-30in30"
  ado_repository_id: "7bacb9f6-54df-4e5e-a87d-7bbb0f5fe2d6"

ci_pipeline:
  # Left blank for Salesforce work — the salesforce-dev-loop skill owns
  # verification via sf_deploy (dry-run) and sf_apex_test against a
  # scratch org provisioned per ticket. The repo also contains a Node
  # scaffold with its own tests, but the harness runs SF work from the
  # SFDX project root (sfdx-project.json), not the Node side.
  test_command: ""
  lint_command: ""
  build_command: ""
  e2e_command: ""

test_framework:
  unit: ""
  integration: ""
  e2e: ""

client_repo:
  # ~ is expanded by ClientProfile.client_repo_path at load time.
  # Under /tmp the repo is wiped on reboot and L1 spawn fails silently.
  local_path: "~/.harness/clients/XC-SF-30in30"
  github_repo: ""

autonomy:
  auto_merge_enabled: false
  low_risk_ticket_types: [bug, chore, config, dependency, docs]
