# Client Profile Schema
# Copy this file and fill in your client-specific values.
# Save as: runtime/client-profiles/<client-name>.yaml

client: "Client Name"
platform_profile: ""  # sitecore | salesforce | (empty for generic)

ticket_source:
  type: "jira"  # jira | ado
  instance: "https://client.atlassian.net"
  project_key: "PROJ"
  ado_project_name: ""               # (ADO only) Actual ADO project name for webhook routing
  ai_label: "ai-implement"           # Label/tag that triggers the pipeline
  quick_label: "ai-quick"            # Label/tag for single-agent quick mode
  clarification_status: "Needs Info" # Status set when analyst needs more info
  done_status: "Done"                # Status set on PR creation
  custom_fields:
    acceptance_criteria: "customfield_10429"
    story_points: "customfield_10040"

source_control:
  type: "github"  # github | azure-repos
  org: "client-org"
  repo: "client-repo"
  default_branch: "main"
  branch_prefix: "ai/"               # AI-created branches prefixed for visibility
  pr_reviewers: []                    # GitHub usernames to auto-assign as reviewers
  # Azure Repos only (required when type: azure-repos):
  ado_project: ""                     # ADO project name for MCP/API calls (usually same as ticket_source.ado_project_name)
  ado_repository_id: ""               # Azure Repos repository GUID (required by ADO MCP tools)

ci_pipeline:
  test_command: "npm test"
  lint_command: "npm run lint"
  build_command: "npm run build"
  e2e_command: ""                     # Empty = skip E2E

test_framework:
  unit: "jest"              # jest | pytest | nunit | xunit
  integration: ""           # supertest | pytest | (empty = skip)
  e2e: ""                   # playwright | cypress | (empty = skip)

client_repo:
  local_path: ""            # Local path to the client repo for spawning agents
  github_repo: ""           # "owner/repo" — used by L3 to resolve repo → profile
  url: ""                   # Optional: full GitHub URL (alternative to github_repo)

# Autonomy engine settings (Phase 4 auto-merge)
autonomy:
  auto_merge_enabled: false                                          # Default OFF — set true to let harness auto-merge PRs when recommended_mode permits
  low_risk_ticket_types: [bug, chore, config, dependency, docs]      # Types eligible in semi_autonomous mode
